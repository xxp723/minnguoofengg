<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#F5F1EA" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="小手机" />
  <title>MiniPhone</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="assets/icons/icon-192.png" type="image/png" />
  <link rel="apple-touch-icon" href="assets/icons/icon-192.png" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div class="phone-frame">
    <div class="screen" id="screen-root">
      <!--顶部状态栏（可在设置中隐藏/显示） -->
      <div id="top-status-bar" class="status-bar">
        <div class="status-left">
          <span id="sys-time">00:00</span>
        </div>
        <div class="status-right">
          <div class="battery-icon">
            <div id="battery-level" class="battery-level" style="width: 100%;"></div>
          </div></div>
      </div>

      <!-- 桌面容器：静态两页结构，可直接 file:// 预览 -->
      <div id="desktop-container" class="desktop-container" data-static-layout="true">
        <!-- 第一页 -->
        <section class="desktop-page page-1" data-page-id="page-1">
          <!-- [模块标注] 透明时钟组件样式模块：时钟组件仅保留时间与日期文字，去除其余标签文案 -->
          <div class="p1-clock-widget">
            <div class="p1-clock-shell">
              <div class="p1-time" id="widget-time">00:00</div>
              <div class="p1-date" id="widget-date">1925年1月1日 星期一</div>
            </div>
          </div>

          <div class="p1-widgets-row">
            <!-- 头像框：3:4 比例，点击弹窗编辑 -->
            <div class="p1-avatar-widget" id="avatar-trigger" title="点击编辑头像">
              <div class="p1-avatar-inner">
                <img class="p1-avatar-img" id="widget-avatar" style="display:none;" alt="头像" />
                <div class="p1-avatar-hint" id="widget-avatar-hint">點擊上傳</div>
              </div>
              <div class="p1-avatar-desc" id="cfg-avatar-desc">號加外急<br>0123456789</div>
            </div>

            <!-- 报纸组件：点击弹窗编辑 -->
            <div class="p1-news-widget" id="news-trigger" title="点击编辑报纸">
              <div class="p1-news-title" id="cfg-news-title">民国日报</div>
              <div class="p1-news-content" id="cfg-news-content">
                旧时光里的人事风烟，<br>皆可在此书写。<br>从右到左的竖排，<br>记录你的报纸头条。
              </div></div>
          </div>

          <!-- 四个应用：闲谈、档案、茶馆、观书 -->
          <div class="p1-apps-row">
            <div class="app-icon" draggable="true" data-app-id="chat" title="闲谈">
              <button class="app-icon-btn" type="button" data-open-app="chat" aria-label="打开闲谈">
                <span class="app-icon-glyph"><svg width="28" height="28" viewBox="0 0 48 48" fill="none"><path d="M44 6H4v28h14l68l6-8h14V6Z" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/><line x1="14" y1="18" x2="34" y2="18" stroke="currentColor" stroke-width="3" stroke-linecap="round"/><line x1="14" y1="26" x2="28" y2="26" stroke="currentColor" stroke-width="3" stroke-linecap="round"/></svg></span>
                <img class="app-custom-img" data-app-img="chat" src="" style="display:none;" alt="闲谈" />
              </button>
              <span class="app-icon-label">闲谈</span>
            </div>
            <div class="app-icon" draggable="true" data-app-id="archive" title="档案">
              <button class="app-icon-btn" type="button" data-open-app="archive" aria-label="打开档案">
                <span class="app-icon-glyph"><svg width="28" height="28" viewBox="0 0 48 48" fill="none"><rect x="4" y="10" width="40" height="6" rx="1" stroke="currentColor" stroke-width="3" stroke-linejoin="round"/><path d="M8 16v22h32V16" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/><line x1="20" y1="26" x2="28" y2="26" stroke="currentColor" stroke-width="3" stroke-linecap="round"/></svg></span>
                <img class="app-custom-img" data-app-img="archive" src="" style="display:none;" alt="档案" />
              </button>
              <span class="app-icon-label">档案</span>
            </div>
            <div class="app-icon" draggable="true" data-app-id="forum" title="茶馆">
              <button class="app-icon-btn" type="button" data-open-app="forum" aria-label="打开茶馆">
                <span class="app-icon-glyph"><svg width="28" height="28" viewBox="0 0 48 48" fill="none"><circle cx="24" cy="12" r="6" stroke="currentColor" stroke-width="3"/><path d="M36 42c0-6.6-5.4-12-12-12S12 35.4 12 42" stroke="currentColor" stroke-width="3" stroke-linecap="round"/><circle cx="39" cy="14" r="4" stroke="currentColor" stroke-width="3"/><path d="M44 38c0-4-2.7-7-6-7" stroke="currentColor" stroke-width="3" stroke-linecap="round"/><circle cx="9" cy="14" r="4" stroke="currentColor" stroke-width="3"/><path d="M4 38c0-4 2.7-7 6-7" stroke="currentColor" stroke-width="3" stroke-linecap="round"/></svg></span>
                <img class="app-custom-img" data-app-img="forum" src="" style="display:none;" alt="茶馆" />
              </button>
              <span class="app-icon-label">茶馆</span>
            </div>
            <div class="app-icon" draggable="true" data-app-id="reader" title="观书">
              <button class="app-icon-btn" type="button" data-open-app="reader" aria-label="打开观书">
                <span class="app-icon-glyph"><svg width="28" height="28" viewBox="0 0 48 48" fill="none"><path d="M4 8h16c2.2 0 4 1.8 4 4v28c-2.2-2-5.4-2-8-2H4V8Z" stroke="currentColor" stroke-width="3" stroke-linejoin="round"/><path d="M44 8H28c-2.2 0-4 1.8-4 4v28c2.2-2 5.4-2 8-2h12V8Z" stroke="currentColor" stroke-width="3" stroke-linejoin="round"/></svg></span>
                <img class="app-custom-img" data-app-img="reader" src="" style="display:none;" alt="观书" />
              </button>
              <span class="app-icon-label">观书</span>
            </div>
          </div>

          <!-- 民国车票组件 -->
          <div class="p1-ticket-widget" id="p1-ticket-trigger" title="点击编辑">
            <div class="p1-ticket-inner">
              <div class="p1-ticket-brand" id="cfg-p1-ticket-brand">中华民国长江航运公司</div>
              <div class="p1-ticket-body">
                <div class="p1-ticket-route">
                  <div class="p1-ticket-arrows">
                    <span id="cfg-p1-ticket-from">重庆</span>
                    <span class="p1-ticket-arrow">→</span>
                    <span id="cfg-p1-ticket-to">汉口</span>
                  </div>
                  <div class="p1-ticket-date" id="cfg-p1-ticket-date">民国十四年五月初七</div>
                </div>
                <div class="p1-ticket-footer">
                  <span id="cfg-p1-ticket-name">乘客：张三</span>
                  <span id="cfg-p1-ticket-time">开航：辰时</span>
                  <span id="cfg-p1-ticket-no">票号：M1925-001</span>
                </div>
              </div>
            </div>
          </div>
        </section>

        <!-- 第二页 -->
        <section class="desktop-page page-2" data-page-id="page-2">
          <div class="p2-ticket-widget" id="p2-ticket-trigger" title="点击编辑">
            <div class="p2-ticket-inner">
              <div class="p2-ticket-brand" id="cfg-ticket-brand">浮生剧院</div>
              <div class="p2-ticket-img-box">
                <img class="p2-ticket-img" id="widget-ticket-img" style="display:none;" alt="戏票图" />
                <div class="p2-ticket-stamp" id="cfg-ticket-stamp">No.001925凭券入场</div>
              </div>
              <div class="p2-ticket-text-zone">
                <div class="p2-ticket-title" id="cfg-ticket-title">旧戏新梦</div>
                <div class="p2-ticket-desc" id="cfg-ticket-desc">
                  <span>首映：辛已年五月廿十</span>
                  <span>地点：渝州县横河街</span>
                  <span>剧目：经年旧事，浮生若梦</span>
                </div>
              </div>
            </div>
          </div>

          <!-- 三个应用：戏笔、梦笺、游戏 -->
          <div class="p2-apps-row">
            <div class="app-icon" draggable="true" data-app-id="doujin" title="戏笔">
              <button class="app-icon-btn" type="button" data-open-app="doujin" aria-label="打开戏笔">
                <span class="app-icon-glyph"><svg width="28" height="28" viewBox="0 0 48 48" fill="none"><path d="M7 42l3-12L34 6l6 6L16 36L7 42Z" stroke="currentColor" stroke-width="3" stroke-linejoin="round"/><line x1="30" y1="10" x2="38" y2="18" stroke="currentColor" stroke-width="3" stroke-linecap="round"/><line x1="10" y1="30" x2="18" y2="38" stroke="currentColor" stroke-width="3" stroke-linecap="round"/></svg></span>
                <img class="app-custom-img" data-app-img="doujin" src="" style="display:none;" alt="戏笔" />
              </button>
              <span class="app-icon-label">戏笔</span>
            </div>
            <div class="app-icon" draggable="true" data-app-id="textgame" title="梦笺">
              <button class="app-icon-btn" type="button" data-open-app="textgame" aria-label="打开梦笺">
                <span class="app-icon-glyph"><svg width="28" height="28" viewBox="0 0 48 48" fill="none"><rect x="8" y="4" width="32" height="40" rx="2" stroke="currentColor" stroke-width="3" stroke-linejoin="round"/><line x1="16" y1="14" x2="32" y2="14" stroke="currentColor" stroke-width="3" stroke-linecap="round"/><line x1="16" y1="22" x2="32" y2="22" stroke="currentColor" stroke-width="3" stroke-linecap="round"/><line x1="16" y1="30" x2="26" y2="30" stroke="currentColor" stroke-width="3" stroke-linecap="round"/></svg></span>
                <img class="app-custom-img" data-app-img="textgame" src="" style="display:none;" alt="梦笺" />
              </button>
              <span class="app-icon-label">梦笺</span>
            </div>
            <div class="app-icon" draggable="true" data-app-id="game" title="游戏">
              <button class="app-icon-btn" type="button" data-open-app="game" aria-label="打开游戏">
                <span class="app-icon-glyph"><svg width="28" height="28" viewBox="0 0 48 48" fill="none"><rect x="4" y="14" width="40" height="22" rx="8" stroke="currentColor" stroke-width="3" stroke-linejoin="round"/><circle cx="16" cy="25" r="3" stroke="currentColor" stroke-width="3"/><circle cx="32" cy="25" r="3" stroke="currentColor" stroke-width="3"/><line x1="23" y1="21" x2="25" y2="21" stroke="currentColor" stroke-width="3" stroke-linecap="round"/><line x1="23" y1="29" x2="25" y2="29" stroke="currentColor" stroke-width="3" stroke-linecap="round"/></svg></span>
                <img class="app-custom-img" data-app-img="game" src="" style="display:none;" alt="游戏" />
              </button>
              <span class="app-icon-label">游戏</span>
            </div>
          </div>
        </section>
      </div>

      <!-- 底部 Dock 栏 -->
      <div id="dock-container" class="dock-container">
        <div class="app-icon dock-icon" data-app-id="worldbook">
          <button class="app-icon-btn dock-btn" type="button" data-open-app="worldbook">
            <span class="app-icon-glyph"><svg width="28" height="28" viewBox="0 0 48 48" fill="none"><circle cx="24" cy="24" r="20" stroke="currentColor" stroke-width="3"/><ellipse cx="24" cy="24" rx="9" ry="20" stroke="currentColor" stroke-width="3"/><line x1="6" y1="18" x2="42" y2="18" stroke="currentColor" stroke-width="3" stroke-linecap="round"/><line x1="6" y1="30" x2="42" y2="30" stroke="currentColor" stroke-width="3" stroke-linecap="round"/></svg></span>
            <img class="app-custom-img" data-dock-img="worldbook" src="" style="display:none;" alt="世情"/>
          </button>
        </div>
        <div class="app-icon dock-icon" data-app-id="memory">
          <button class="app-icon-btn dock-btn" type="button" data-open-app="memory">
            <span class="app-icon-glyph"><svg width="28" height="28" viewBox="0 0 48 48" fill="none"><circle cx="24" cy="24" r="20" stroke="currentColor" stroke-width="3"/><polyline points="24,14 24,24 32,30" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
            <img class="app-custom-img" data-dock-img="memory" src="" style="display:none;" alt="旧事"/>
          </button>
        </div>
        <div class="app-icon dock-icon" data-app-id="settings">
          <button class="app-icon-btn dock-btn" type="button" data-open-app="settings">
            <span class="app-icon-glyph"><svg width="28" height="28" viewBox="0 0 48 48" fill="none"><path transform="translate(2, 0)" d="M18.3 6.1L17 11.4a13 13 0 0 0-4.4 2.5l-5.1-1.7L4 18.5l3.8 3.6a13 13 0 0 0 0 3.8L4 29.5l3.5 6.3l5.1-1.7a13 13 0 0 0 4.4 2.5l1.3 5.3h7.4l1.3-5.3a13 13 0 0 0 4.4-2.5l5.1 1.7l3.5-6.3l-3.8-3.6a13 13 0 0 0 0-3.8l3.8-3.6l-3.5-6.3l-5.1 1.7a13 13 0 0 0-4.4-2.5L25.7 6.1h-7.4Z" stroke="currentColor" stroke-width="3" stroke-linejoin="round"/><circle cx="24" cy="24" r="5" stroke="currentColor" stroke-width="3"/></svg></span>
            <img class="app-custom-img" data-dock-img="settings" src="" style="display:none;" alt="设置"/>
          </button>
        </div>
      </div>

      <!-- 组件弹窗 -->
      <div id="widget-modal" class="widget-modal hidden" aria-hidden="true">
        <div class="widget-modal__mask"></div>
        <div class="widget-modal__panel" role="dialog" aria-modal="true">
          <div class="widget-modal__header">
            <span id="widget-modal-title">编辑</span>
            <button type="button" class="widget-modal__close" id="widget-modal-close" aria-label="关闭">
              <span class="iconpark-inline" aria-hidden="true">
                <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg" width="18" height="18"><path d="M14 14L34 34" stroke="currentColor" stroke-width="3" stroke-linecap="round"/><path d="M34 14L14 34" stroke="currentColor" stroke-width="3" stroke-linecap="round"/></svg>
              </span>
            </button>
          </div>
          <div class="widget-modal__body">
            <div class="modal-section" data-modal-section="avatar">
              <div class="modal-field">
                <label>头像图片</label>
                <div class="modal-img-preview">
                  <img id="modal-avatar-preview" style="display:none;" alt="头像预览" />
                  <div class="modal-img-placeholder" id="modal-avatar-placeholder">尚未设置</div>
                </div>
                <!-- [模块标注] 头像组件短按钮动作区模块：上传/删除短按钮统一走右对齐动作区，便于后续单独调整 -->
                <div class="short-action-row">
                  <button type="button" class="modal-btn" id="modal-avatar-upload">上传/URL</button>
                  <button type="button" class="modal-btn" id="modal-avatar-delete" style="background:#c0392b;color:#fff;">删除图片</button>
                </div>
              </div>
              <div class="modal-field">
                <label>文字内容</label>
                <textarea id="modal-avatar-desc-input" rows="2" placeholder="输入头像下方说明"></textarea>
              </div>
            </div>
            <div class="modal-section" data-modal-section="news">
              <div class="modal-field">
                <label>标题</label>
                <input id="modal-news-title-input" type="text" placeholder="报纸标题" />
              </div>
              <div class="modal-field">
                <label>正文</label>
                <textarea id="modal-news-content-input" rows="4" placeholder="报纸正文，支持换行"></textarea>
              </div>
            </div>
            <div class="modal-section" data-modal-section="ticket1">
              <div class="modal-field">
                <label>航运公司名称</label>
                <input id="modal-ticket1-brand-input" type="text" />
              </div>
              <div class="modal-field">
                <label>日期</label>
                <input id="modal-ticket1-date-input" type="text" />
              </div>
              <div class="modal-field" style="display:flex;gap:10px;flex-direction:row;">
                <div style="flex:1;"><label>起点</label><input id="modal-ticket1-from-input" type="text" /></div>
                <div style="flex:1;"><label>终点</label><input id="modal-ticket1-to-input" type="text" /></div>
              </div>
              <div class="modal-field">
                <label>乘客</label>
                <input id="modal-ticket1-name-input" type="text" />
              </div>
              <div class="modal-field">
                <label>开航</label>
                <input id="modal-ticket1-time-input" type="text" />
              </div>
              <div class="modal-field">
                <label>票号</label>
                <input id="modal-ticket1-no-input" type="text" />
              </div>
            </div>
            <div class="modal-section" data-modal-section="ticket2">
              <div class="modal-field">
                <label>戏票图片</label>
                <div class="modal-img-preview">
                  <img id="modal-ticket2-preview" style="display:none;" alt="图片预览" />
                  <div class="modal-img-placeholder" id="modal-ticket2-placeholder">尚未设置</div>
                </div>
                <!-- [模块标注] 戏票组件短按钮动作区模块：上传/删除短按钮统一走右对齐动作区，便于后续单独调整 -->
                <div class="short-action-row">
                  <button type="button" class="modal-btn" id="modal-ticket2-upload">上传/URL</button>
                  <button type="button" class="modal-btn" id="modal-ticket2-delete" style="background:#c0392b;color:#fff;">删除图片</button>
                </div>
              </div>
              <div class="modal-field">
                <label>剧院名称</label>
                <input id="modal-ticket2-brand-input" type="text" />
              </div>
              <div class="modal-field">
                <label>戏票标题</label>
                <input id="modal-ticket2-title-input" type="text" />
              </div>
              <div class="modal-field">
                <label>戏票内容</label>
                <textarea id="modal-ticket2-desc-input" rows="3"></textarea>
              </div><div class="modal-field">
                <label>印章内容</label>
                <input id="modal-ticket2-stamp-input" type="text" />
              </div>
            </div>

            <div class="modal-section" data-modal-section="music">
              <div class="modal-field">
                <label>音乐标题</label>
                <input id="modal-music-title-input" type="text" placeholder="请输入音乐标题" />
              </div>
              <div class="modal-field">
                <label>封面图片</label>
                <div class="modal-img-preview">
                  <img id="modal-music-cover-preview" style="display:none;" alt="封面预览" />
                  <div class="modal-img-placeholder" id="modal-music-cover-placeholder">尚未设置</div>
                </div>
                <!-- [模块标注] 音乐组件图片动作区模块：封面上传/删除按钮统一走右对齐动作区，便于后续单独调整 -->
                <div class="short-action-row">
                  <button type="button" class="modal-btn" id="modal-music-cover-upload">上传/URL</button>
                  <button type="button" class="modal-btn" id="modal-music-cover-delete" style="background:#c0392b;color:#fff;">删除图片</button>
                </div>
              </div>
              <div class="modal-field">
                <label>音频文件</label>
                <input id="modal-music-audio-name" type="text" placeholder="未导入音频" readonly />
                <!-- [模块标注] 音乐组件音频动作区模块：音频上传/删除按钮统一走右对齐动作区，便于后续单独调整 -->
                <div class="short-action-row">
                  <button type="button" class="modal-btn" id="modal-music-audio-upload">上传/URL</button>
                  <button type="button" class="modal-btn" id="modal-music-audio-delete" style="background:#c0392b;color:#fff;">删除音频</button>
                </div>
              </div>
            </div>

            <div class="modal-section" data-modal-section="calendar">
              <div class="modal-field">
                <label>日历标题</label>
                <input id="modal-calendar-title-input" type="text" placeholder="请输入日历标题" />
              </div>
              <div class="modal-field">
                <label>日程内容</label>
                <textarea id="modal-calendar-lines-input" rows="5" placeholder="每行一条日程"></textarea>
              </div>
            </div>

            <div class="modal-section" data-modal-section="polaroid">
              <div class="modal-field">
                <label>拍立得标题</label>
                <input id="modal-polaroid-title-input" type="text" placeholder="请输入标题" />
              </div>
              <div class="modal-field">
                <label>说明文字</label>
                <textarea id="modal-polaroid-subtitle-input" rows="2" placeholder="请输入说明文字"></textarea>
              </div>
              <div class="modal-field">
                <label>图片</label>
                <div class="modal-img-preview">
                  <img id="modal-polaroid-image-preview" style="display:none;" alt="拍立得预览" />
                  <div class="modal-img-placeholder" id="modal-polaroid-image-placeholder">尚未设置</div>
                </div>
                <div class="short-action-row">
                  <button type="button" class="modal-btn" id="modal-polaroid-image-upload">上传/URL</button>
                  <button type="button" class="modal-btn" id="modal-polaroid-image-delete" style="background:#c0392b;color:#fff;">删除图片</button>
                </div>
              </div>
            </div>

            <div class="modal-section" data-modal-section="profile">
              <div class="modal-field">
                <label>名称</label>
                <input id="modal-profile-name-input" type="text" placeholder="请输入名称" />
              </div>
              <div class="modal-field">
                <label>副标题</label>
                <input id="modal-profile-role-input" type="text" placeholder="请输入副标题" />
              </div>
              <div class="modal-field">
                <label>标签</label>
                <textarea id="modal-profile-tags-input" rows="4" placeholder="每行一个标签"></textarea>
              </div>
            </div>

            <div class="modal-section" data-modal-section="todo">
              <div class="modal-field">
                <label>标题</label>
                <input id="modal-todo-title-input" type="text" placeholder="请输入标题" />
              </div>
              <div class="modal-field">
                <label>待办事项</label>
                <textarea id="modal-todo-items-input" rows="5" placeholder="每行一条；已完成项可用 [x] 开头"></textarea>
              </div>
            </div>

            <div class="modal-section" data-modal-section="memo">
              <div class="modal-field">
                <label>标题</label>
                <input id="modal-memo-title-input" type="text" placeholder="请输入标题" />
              </div>
              <div class="modal-field">
                <label>便签内容</label>
                <textarea id="modal-memo-lines-input" rows="5" placeholder="每行一条内容"></textarea>
              </div>
            </div>

            <div class="modal-section" data-modal-section="custom">
              <div class="modal-field">
                <label>组件名称</label>
                <input id="modal-custom-name-input" type="text" placeholder="请输入组件名称" />
              </div>
              <div class="modal-field">
                <label>组件代码</label>
                <textarea id="modal-custom-source-input" rows="10" placeholder="请编辑 JSON 组件代码"></textarea>
              </div>
              <div class="modal-field">
                <label>说明</label>
                <div class="modal-help-text">保存后会同步更新该自定义组件在组件库与已放置到桌面的显示内容。</div>
              </div>
            </div>
          </div>
          <!-- [模块标注] 组件编辑弹窗底部短按钮模块：保存类短按钮统一在视觉上右对齐 -->
          <div class="widget-modal__footer short-action-row">
            <button type="button" class="modal-btn primary" id="widget-modal-save">保存</button>
          </div>
        </div>
      </div>

      <!-- 隐藏的图片上传表单 -->
      <input type="file" id="sys-file-upload" accept="image/*" style="display: none;" />

      <!-- [模块标注] 桌面编辑模式图标模块：此区域按键图标统一使用 IconPark 风格 SVG -->
      <div id="edit-toolbar" class="edit-toolbar">
        <button type="button" class="edit-toolbar-btn primary" id="edit-btn-add" title="添加应用/组件" aria-label="添加应用/组件">
          <span class="edit-toolbar-icon" aria-hidden="true">
            <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg" width="18" height="18"><path d="M24 10V38" stroke="currentColor" stroke-width="3" stroke-linecap="round"/><path d="M10 24H38" stroke="currentColor" stroke-width="3" stroke-linecap="round"/></svg>
          </span>
        </button>
        <button type="button" class="edit-toolbar-btn" id="edit-btn-add-page" title="新增桌面页" aria-label="新增桌面页">
          <span class="edit-toolbar-icon" aria-hidden="true">
            <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg" width="18" height="18"><rect x="6" y="6" width="16" height="16" rx="3" stroke="currentColor" stroke-width="3"/><rect x="26" y="6" width="16" height="16" rx="3" stroke="currentColor" stroke-width="3"/><rect x="6" y="26" width="16" height="16" rx="3" stroke="currentColor" stroke-width="3"/><path d="M34 24V44" stroke="currentColor" stroke-width="3" stroke-linecap="round"/><path d="M24 34H44" stroke="currentColor" stroke-width="3" stroke-linecap="round"/></svg>
          </span>
        </button>
        <button type="button" class="edit-toolbar-btn" id="edit-btn-remove-page" title="删除当前页" aria-label="删除当前页">
          <span class="edit-toolbar-icon" aria-hidden="true">
            <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg" width="18" height="18"><rect x="6" y="6" width="36" height="36" rx="4" stroke="currentColor" stroke-width="3"/><path d="M14 24H34" stroke="currentColor" stroke-width="3" stroke-linecap="round"/></svg>
          </span>
        </button>
        <button type="button" class="edit-toolbar-btn" id="edit-btn-reset" title="恢复默认布局" aria-label="恢复默认布局">
          <span class="edit-toolbar-icon" aria-hidden="true">
            <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg" width="18" height="18"><path d="M10 24C10 16.268 16.268 10 24 10C30.16 10 35.39 13.975 37.327 19.5" stroke="currentColor" stroke-width="3" stroke-linecap="round"/><path d="M38 10V20H28" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/><path d="M38 24C38 31.732 31.732 38 24 38C17.84 38 12.61 34.025 10.673 28.5" stroke="currentColor" stroke-width="3" stroke-linecap="round"/><path d="M10 38V28H20" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </span>
        </button>
        <button type="button" class="edit-toolbar-btn" id="edit-btn-done" title="完成并保存" aria-label="完成并保存">
          <span class="edit-toolbar-icon" aria-hidden="true">
            <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg" width="18" height="18"><path d="M10 25L20 34L38 14" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </span>
        </button>
        <button type="button" class="edit-toolbar-btn" id="edit-btn-close" title="关闭并放弃修改" aria-label="关闭并放弃修改">
          <span class="edit-toolbar-icon" aria-hidden="true">
            <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg" width="18" height="18"><path d="M14 14L34 34" stroke="currentColor" stroke-width="3" stroke-linecap="round"/><path d="M34 14L14 34" stroke="currentColor" stroke-width="3" stroke-linecap="round"/></svg>
          </span>
        </button>
      </div>

      <!-- 桌面编辑模式添加面板 -->
      <div id="add-panel-mask" class="add-panel-mask"></div>
      <div id="add-panel" class="add-panel">
        <div class="add-panel-title">添加应用与组件</div>
        <div class="add-panel-grid" id="add-panel-grid">
          <!-- 动态渲染可用应用和组件 -->
        </div>
      </div>

      <!-- 网格辅助线 -->
      <div class="grid-lines" id="grid-lines"></div>

      <!-- Toast 提示 -->
      <div class="desktop-toast" id="desktop-toast"></div>

      <!-- 应用窗口容器 -->
      <div id="window-container" class="window-container"></div>
    </div>
  </div>

  <!-- 直接打开文件也能运行的基础脚本（非模块） -->
  <script>
    (() => {
      const $ = (id) => document.getElementById(id);

      // 状态栏显示控制（与设置应用对接：localStorage miniphone_status_bar_hidden = '1'）
      const statusHidden = localStorage.getItem('miniphone_status_bar_hidden') === '1';
      if (statusHidden) document.body.classList.add('hide-status-bar');

      // 全屏模式控制（与设置应用对接：localStorage miniphone_fullscreen = '1'）
      const fullscreenOn = localStorage.getItem('miniphone_fullscreen') === '1';
      if (fullscreenOn) document.body.classList.add('fullscreen-mode');

      // 壁纸（与设置应用对接：localStorage miniphone_wallpaper）
      const screen = $('screen-root');
      const savedWallpaper = localStorage.getItem('miniphone_wallpaper');
      if (screen && savedWallpaper) {
        screen.style.backgroundImage = `url(${savedWallpaper})`;screen.style.backgroundSize = 'cover';
        screen.style.backgroundPosition = 'center';
      }

      // 时钟（顶部 & 组件）
      const updateClock = () => {
        const now = new Date();
        const hh = String(now.getHours()).padStart(2, '0');
        const mm = String(now.getMinutes()).padStart(2, '0');
        const days = ['日', '一', '二', '三', '四', '五', '六'];
        const year = now.getFullYear();
        const month = now.getMonth() + 1;
        const date = now.getDate();
        const day = days[now.getDay()];

        const timeStr = `${hh}:${mm}`;
        const dateStr = `${year}年${month}月${date}日星期${day}`;

        const topTime = $('sys-time');
        const widgetTime = $('widget-time');
        const widgetDate = $('widget-date');
        if (topTime) topTime.textContent = timeStr;
        if (widgetTime) widgetTime.textContent = timeStr;
        if (widgetDate) widgetDate.textContent = dateStr;
      };
      updateClock();
      setInterval(updateClock, 10000);

      // 电池
      const batteryLevelEl = $('battery-level');
      if (batteryLevelEl) {
        if ('getBattery' in navigator) {
          navigator.getBattery().then((battery) => {
            const updateBattery = () => {
              batteryLevelEl.style.width = (battery.level * 100) + '%';
              batteryLevelEl.style.background = battery.level <= 0.2 ? '#e74c3c' : 'var(--c-text-main)';
            };
            updateBattery();
            battery.addEventListener('levelchange', updateBattery);
          });
        } else {
          batteryLevelEl.style.width = '80%';
        }
      }

      // 通用图片应用
      const applyImage = (target, src) => {
        if (target === 'avatar') {
          const img = $('widget-avatar');
          const hint = $('widget-avatar-hint');
          if (img) { img.src = src; img.style.display = 'block'; }
          if (hint) hint.style.display = 'none';localStorage.setItem('miniphone_widget_avatar', src);
        } else if (target === 'ticket' || target === 'ticket2') {
          const img = $('widget-ticket-img');
          if (img) { img.src = src; img.style.display = 'block'; }
          localStorage.setItem('miniphone_widget_ticket', src);
        } else if (target === 'news') {
          const img = $('widget-news-img');
          if (img) { img.src = src; img.style.display = 'block'; }
          localStorage.setItem('miniphone_widget_news_img', src);
        }
      };

      // 删除图片
      const removeImage = (target) => {
        if (target === 'avatar') {
          const img = $('widget-avatar');
          const hint = $('widget-avatar-hint');
          if (img) { img.src = ''; img.style.display = 'none'; }
          if (hint) hint.style.display = 'block';
          localStorage.removeItem('miniphone_widget_avatar');
        } else if (target === 'ticket' || target === 'ticket2') {
          const img = $('widget-ticket-img');
          if (img) { img.src = ''; img.style.display = 'none'; }
          localStorage.removeItem('miniphone_widget_ticket');
        }
      };

      // 恢复图片
      const savedAvatar = localStorage.getItem('miniphone_widget_avatar');
      if (savedAvatar) applyImage('avatar', savedAvatar);
      const savedTicket = localStorage.getItem('miniphone_widget_ticket');
      if (savedTicket) applyImage('ticket', savedTicket);
      const savedNewsImg = localStorage.getItem('miniphone_widget_news_img');
      if (savedNewsImg) applyImage('news', savedNewsImg);

      // 恢复文本
      const textFields = [
        'cfg-avatar-desc',
        'cfg-news-title',
        'cfg-news-content',
        'cfg-ticket-brand',
        'cfg-ticket-title',
        'cfg-ticket-desc',
        'cfg-ticket-stamp',
        'cfg-p1-ticket-brand',
        'cfg-p1-ticket-date',
        'cfg-p1-ticket-from',
        'cfg-p1-ticket-to',
        'cfg-p1-ticket-name',
        'cfg-p1-ticket-time',
        'cfg-p1-ticket-no'
      ];
      textFields.forEach(id => {
        const el = $(id);
        if (!el) return;
        const saved = localStorage.getItem('miniphone_widget_' + id);
        if (saved) el.innerHTML = saved;
        el.addEventListener('blur', () => {
          localStorage.setItem('miniphone_widget_' + id, el.innerHTML);
        });
        el.addEventListener('mousedown', (e) => e.stopPropagation());
      });

      // 弹窗相关
      const modal = $('widget-modal');
      const modalClose = $('widget-modal-close');
      const modalSave = $('widget-modal-save');
      const modalTitle = $('widget-modal-title');
      const modalSections = document.querySelectorAll('.modal-section');
      const modalAvatarUpload = $('modal-avatar-upload');
      const modalAvatarPreview = $('modal-avatar-preview');
      const modalAvatarPlaceholder = $('modal-avatar-placeholder');
      const modalAvatarDescInput = $('modal-avatar-desc-input');
      const modalNewsUpload = $('modal-news-upload');
      const modalNewsTitleInput = $('modal-news-title-input');
      const modalNewsContentInput = $('modal-news-content-input');

      const modalTicket1Upload = $('modal-ticket1-upload');
      const modalTicket1Preview = $('modal-ticket1-preview');
      const modalTicket1Placeholder = $('modal-ticket1-placeholder');
      const modalTicket1Brand = $('modal-ticket1-brand-input');
      const modalTicket1Date = $('modal-ticket1-date-input');
      const modalTicket1From = $('modal-ticket1-from-input');
      const modalTicket1To = $('modal-ticket1-to-input');
      const modalTicket1Name = $('modal-ticket1-name-input');
      const modalTicket1Time = $('modal-ticket1-time-input');
      const modalTicket1No = $('modal-ticket1-no-input');

      const modalTicket2Upload = $('modal-ticket2-upload');
      const modalTicket2Preview = $('modal-ticket2-preview');
      const modalTicket2Placeholder = $('modal-ticket2-placeholder');
      const modalTicket2Brand = $('modal-ticket2-brand-input');
      const modalTicket2Title = $('modal-ticket2-title-input');
      const modalTicket2Desc = $('modal-ticket2-desc-input');
      const modalTicket2Stamp = $('modal-ticket2-stamp-input');

      const fileInput = $('sys-file-upload');
      let currentUploadTarget = null;
      let currentModalMode = null;

      // [模块标注] 图片资源主题弹窗模块：替换头像/戏票上传时的浏览器原生 confirm/prompt，为主题风格弹窗（与桌面编辑窗口一致）
      let inlineResourceModalRefs = null;
      let inlineResourceModalResolver = null;

      const ensureInlineManagedResourceModal = () => {
        if (inlineResourceModalRefs) return inlineResourceModalRefs;

        const modal = document.createElement('div');
        modal.id = 'inline-managed-resource-modal';
        modal.className = 'managed-resource-modal hidden';
        modal.setAttribute('aria-hidden', 'true');
        modal.innerHTML = `
          <div class="managed-resource-modal__mask"></div>
          <div class="managed-resource-modal__panel" role="dialog" aria-modal="true" aria-labelledby="inline-managed-resource-title">
            <div class="managed-resource-modal__header">
              <span id="inline-managed-resource-title">选择图片资源</span>
              <button type="button" class="managed-resource-modal__close" id="inline-managed-resource-cancel" aria-label="关闭图片资源弹窗">
                <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg" width="16" height="16"><path d="M14 14L34 34" stroke="currentColor" stroke-width="3" stroke-linecap="round"/><path d="M34 14L14 34" stroke="currentColor" stroke-width="3" stroke-linecap="round"/></svg>
              </button>
            </div>
            <div class="managed-resource-modal__body">
              <p class="managed-resource-modal__hint" id="inline-managed-resource-hint">可从本地导入，也可直接粘贴图片 URL。</p>
              <button type="button" class="modal-btn" id="inline-managed-resource-local">从本地导入图片</button>
              <div class="modal-field">
                <label for="inline-managed-resource-url">图片 URL</label>
                <input id="inline-managed-resource-url" type="url" placeholder="https://example.com/image.jpg" />
              </div>
              <button type="button" class="modal-btn primary" id="inline-managed-resource-confirm">使用 URL 图片</button>
            </div>
          </div>
        `;
        document.body.appendChild(modal);

        const refs = {
          modal,
          mask: modal.querySelector('.managed-resource-modal__mask'),
          title: modal.querySelector('#inline-managed-resource-title'),
          hint: modal.querySelector('#inline-managed-resource-hint'),
          urlInput: modal.querySelector('#inline-managed-resource-url'),
          localBtn: modal.querySelector('#inline-managed-resource-local'),
          cancelBtn: modal.querySelector('#inline-managed-resource-cancel'),
          confirmBtn: modal.querySelector('#inline-managed-resource-confirm')
        };

        const close = (result = null) => {
          refs.modal.classList.add('hidden');
          refs.modal.setAttribute('aria-hidden', 'true');
          if (inlineResourceModalResolver) {
            const resolver = inlineResourceModalResolver;
            inlineResourceModalResolver = null;
            resolver(result);
          }
        };

        refs.mask?.addEventListener('click', () => close(null));
        refs.cancelBtn?.addEventListener('click', () => close(null));
        refs.localBtn?.addEventListener('click', () => close({ type: 'local' }));
        refs.confirmBtn?.addEventListener('click', () => {
          const url = refs.urlInput?.value?.trim();
          if (!url) {
            refs.urlInput?.focus();
            return;
          }
          close({ type: 'url', url });
        });

        inlineResourceModalRefs = refs;
        return refs;
      };

      const openInlineManagedResourcePicker = (target) => {
        const refs = ensureInlineManagedResourceModal();
        const labelMap = {
          avatar: '头像图片',
          ticket2: '戏票图片',
          ticket: '戏票图片',
          news: '图片'
        };
        const label = labelMap[target] || '图片资源';

        refs.title.textContent = `选择${label}`;
        refs.hint.textContent = `你可以从本地导入${label}，也可以输入${label} URL。`;
        refs.urlInput.value = '';
        refs.urlInput.placeholder = 'https://example.com/image.jpg';

        refs.modal.classList.remove('hidden');
        refs.modal.setAttribute('aria-hidden', 'false');
        setTimeout(() => refs.urlInput?.focus(), 0);

        return new Promise((resolve) => {
          inlineResourceModalResolver = resolve;
        });
      };

      const syncModalImagePreview = (target, src = '') => {
        if (target === 'avatar') {
          if (src) {
            modalAvatarPreview.src = src;
            modalAvatarPreview.style.display = 'block';
            modalAvatarPlaceholder.style.display = 'none';
          } else {
            modalAvatarPreview.removeAttribute('src');
            modalAvatarPreview.style.display = 'none';
            modalAvatarPlaceholder.style.display = 'block';
          }
          return;
        }

        if (target === 'ticket2' || target === 'ticket') {
          if (src) {
            modalTicket2Preview.src = src;
            modalTicket2Preview.style.display = 'block';
            modalTicket2Placeholder.style.display = 'none';
          } else {
            modalTicket2Preview.removeAttribute('src');
            modalTicket2Preview.style.display = 'none';
            modalTicket2Placeholder.style.display = 'block';
          }
        }
      };

      const showSection = (mode) => {
        modalSections.forEach(sec => sec.classList.remove('is-active'));
        const target = document.querySelector(`.modal-section[data-modal-section="${mode}"]`);
        if (target) target.classList.add('is-active');
      };

      const openModal = (mode) => {
        currentModalMode = mode;
        modal?.classList.remove('hidden');
        modal?.setAttribute('aria-hidden', 'false');
        const titleMap = { avatar: '编辑头像', news: '编辑报纸', ticket1: '编辑船票', ticket2: '编辑戏票' };
        modalTitle.textContent = titleMap[mode] || '编辑';
        showSection(mode);

        if (mode === 'avatar') {
          const img = $('widget-avatar');
          if (img && img.style.display !== 'none') {
            modalAvatarPreview.src = img.src;
            modalAvatarPreview.style.display = 'block';
            modalAvatarPlaceholder.style.display = 'none';
          } else {
            modalAvatarPreview.style.display = 'none';
            modalAvatarPlaceholder.style.display = 'block';
          }const desc = $('cfg-avatar-desc');
          modalAvatarDescInput.value = desc ? desc.innerText : '';
        } else if (mode === 'news') {
          const img = $('widget-news-img');
          if (img && img.style.display !== 'none') {
            modalNewsPreview.src = img.src;
            modalNewsPreview.style.display = 'block';
            modalNewsPlaceholder.style.display = 'none';
          } else {
            modalNewsPreview.style.display = 'none';
            modalNewsPlaceholder.style.display = 'block';
          }
          const title = $('cfg-news-title');
          const content = $('cfg-news-content');
          modalNewsTitleInput.value = title ? title.innerText : '';
            modalNewsContentInput.value = content ? content.innerHTML.replace(/<br\s*\/?>/g, '\n') : '';
        } else if (mode === 'ticket1') {
          modalTicket1Brand.value = $('cfg-p1-ticket-brand')?.innerText || '';
          modalTicket1Date.value = $('cfg-p1-ticket-date')?.innerText || '';
          modalTicket1From.value = $('cfg-p1-ticket-from')?.innerText || '';
          modalTicket1To.value = $('cfg-p1-ticket-to')?.innerText || '';
          
          const tName = $('cfg-p1-ticket-name')?.innerText || '';
          const tTime = $('cfg-p1-ticket-time')?.innerText || '';
          const tNo = $('cfg-p1-ticket-no')?.innerText || '';
          
          modalTicket1Name.value = tName;
          modalTicket1Time.value = tTime;
          modalTicket1No.value = tNo;
          
        } else if (mode === 'ticket2') {
          const img = $('widget-ticket-img');
          if (img && img.style.display !== 'none') {
            modalTicket2Preview.src = img.src;
            modalTicket2Preview.style.display = 'block';
            modalTicket2Placeholder.style.display = 'none';
          } else {
            modalTicket2Preview.style.display = 'none';
            modalTicket2Placeholder.style.display = 'block';
          }
          modalTicket2Brand.value = $('cfg-ticket-brand')?.innerText || '';
          modalTicket2Title.value = $('cfg-ticket-title')?.innerText || '';
          const descSpans = document.querySelectorAll('#cfg-ticket-desc span');
          let descText = '';
          descSpans.forEach(span => {
            descText += span.innerText + '\n';
          });
          modalTicket2Desc.value = descText.trim();
          modalTicket2Stamp.value = $('cfg-ticket-stamp')?.innerText || '';
        }
      };

      const hideModal = () => {
        modal?.classList.add('hidden');
        modal?.setAttribute('aria-hidden', 'true');
        currentModalMode = null;
      };

      const handleUploadClick = async (target) => {
        const choice = await openInlineManagedResourcePicker(target);
        if (!choice) return;

        if (choice.type === 'local') {
          currentUploadTarget = target;
          fileInput?.click();
          return;
        }

        if (choice.type === 'url' && choice.url) {
          applyImage(target, choice.url);
          syncModalImagePreview(target, choice.url);
        }
      };

      $('avatar-trigger')?.addEventListener('click', () => openModal('avatar'));
      $('news-trigger')?.addEventListener('click', () => openModal('news'));
      $('p1-ticket-trigger')?.addEventListener('click', () => openModal('ticket1'));
      $('p2-ticket-trigger')?.addEventListener('click', () => openModal('ticket2'));

      modalAvatarUpload?.addEventListener('click', () => handleUploadClick('avatar'));
      modalNewsUpload?.addEventListener('click', () => handleUploadClick('news'));
      modalTicket2Upload?.addEventListener('click', () => handleUploadClick('ticket2'));

      // 删除按钮事件
      $('modal-avatar-delete')?.addEventListener('click', () => {
        removeImage('avatar');
        modalAvatarPreview.style.display = 'none';
        modalAvatarPlaceholder.style.display = 'block';
      });
      $('modal-ticket2-delete')?.addEventListener('click', () => {
        removeImage('ticket2');
        modalTicket2Preview.style.display = 'none';
        modalTicket2Placeholder.style.display = 'block';
      });

      modalClose?.addEventListener('click', hideModal);
      modal?.querySelector('.widget-modal__mask')?.addEventListener('click', hideModal);

      if (modalSave) {
        modalSave.addEventListener('click', () => {
          if (currentModalMode === 'avatar') {
            const desc = modalAvatarDescInput.value || '';
            const descEl = $('cfg-avatar-desc');
            if (descEl) {
              descEl.innerText = desc;
              localStorage.setItem('miniphone_widget_cfg-avatar-desc', descEl.innerHTML);
            }
          } else if (currentModalMode === 'news') {
            const title = modalNewsTitleInput.value || '';
            const content = modalNewsContentInput.value || '';
            const titleEl = $('cfg-news-title');
            const contentEl = $('cfg-news-content');
            if (titleEl) {
              titleEl.innerText = title;
              localStorage.setItem('miniphone_widget_cfg-news-title', titleEl.innerHTML);
            }
            if (contentEl) {
              const html = content.replace(/\n/g, '<br>');
              contentEl.innerHTML = html;
              localStorage.setItem('miniphone_widget_cfg-news-content', contentEl.innerHTML);
            }
          } else if (currentModalMode === 'ticket1') {
            const saveText = (id, val) => {
              const el = $(id);
              if (el) {
                el.innerText = val;
                localStorage.setItem('miniphone_widget_' + id, el.innerHTML);
              }
            };
            saveText('cfg-p1-ticket-brand', modalTicket1Brand.value || '');
            saveText('cfg-p1-ticket-date', modalTicket1Date.value || '');
            saveText('cfg-p1-ticket-from', modalTicket1From.value || '');
            saveText('cfg-p1-ticket-to', modalTicket1To.value || '');
            saveText('cfg-p1-ticket-name', modalTicket1Name.value || '');
            saveText('cfg-p1-ticket-time', modalTicket1Time.value || '');
            saveText('cfg-p1-ticket-no', modalTicket1No.value || '');
          } else if (currentModalMode === 'ticket2') {
            const saveText = (id, val) => {
              const el = $(id);
              if (el) {
                el.innerText = val;
                localStorage.setItem('miniphone_widget_' + id, el.innerHTML);
              }
            };
            saveText('cfg-ticket-brand', modalTicket2Brand.value || '');
            saveText('cfg-ticket-title', modalTicket2Title.value || '');
            saveText('cfg-ticket-stamp', modalTicket2Stamp.value || '');
            
            const descEl = $('cfg-ticket-desc');
            if (descEl) {
              const lines = (modalTicket2Desc.value || '').split('\n').filter(l => l.trim() !== '');
              descEl.innerHTML = '';
              lines.forEach(line => {
                const span = document.createElement('span');
                span.innerText = line;
                descEl.appendChild(span);
              });
              localStorage.setItem('miniphone_widget_cfg-ticket-desc', descEl.innerHTML);
            }
          }
          hideModal();
        });
      }

      // 文件选择
      fileInput?.addEventListener('change', (e) => {
        const file = e.target.files?.[0];
        if (!file || !currentUploadTarget) {
          currentUploadTarget = null;
          if (fileInput) fileInput.value = '';
          return;
        }

        const target = currentUploadTarget;
        const reader = new FileReader();
        reader.onload = (evt) => {
          const src = String(evt?.target?.result || '');
          if (!src) {
            currentUploadTarget = null;
            if (fileInput) fileInput.value = '';
            return;
          }

          applyImage(target, src);
          syncModalImagePreview(target, src);

          currentUploadTarget = null;
          if (fileInput) fileInput.value = '';
        };
        reader.readAsDataURL(file);
      });

      // 如果未加载主JS，给应用按钮一个提示
      document.querySelectorAll('[data-open-app]').forEach(btn => {
        btn.addEventListener('click', () => {
          if (!window.__MINIPHONE_APP_READY__) {
            console.warn('模块未加载，仅预览静态桌面。');
          }
        });
      });
    })();
  </script>

  <!-- 模块主入口：通过 HTTP 服务时加载增强功能 -->
  <script type="module" src="js/main.js"></script>
</body>
</html>
